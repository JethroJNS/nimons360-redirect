<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Family - Nimons360</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .family-name {
            font-size: 18px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .family-code {
            background: #f5f5f5;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: inline-block;
        }

        .family-code-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .family-code-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
        }

        .description {
            color: #666;
            margin: 20px 0;
            line-height: 1.6;
            font-size: 15px;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .spinner {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            font-size: 14px;
            color: #667eea;
            margin-top: 15px;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="./ic_app_logo.png" alt="Nimons360 Logo">
        </div>
        <h1>Join Family on Nimons360</h1>
        <div class="family-name" id="familyName">Loading...</div>

        <div class="family-code">
            <div class="family-code-label">Family Code</div>
            <div class="family-code-value" id="familyCode">------</div>
        </div>

        <div class="description">
            Tap the button below to open the Nimons360 app and join this family automatically.
        </div>

        <button class="button" id="openAppBtn" onclick="openApp()">
            Open Nimons360 App
        </button>

        <div class="spinner" id="spinner"></div>
        <div class="status-message" id="statusMsg"></div>

        <div class="footer">
            Nimons360 - Stay connected with family
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const familyId = params.get('id');
        const familyCode = params.get('code');
        const familyName = decodeURIComponent(params.get('name') || 'this family');

        document.getElementById('familyName').textContent = familyName;
        document.getElementById('familyCode').textContent = familyCode || '------';

        const deepLink = `nimons360://family/${familyId}?code=${familyCode}`;

        let redirectAttempted = false;
        let appOpened = false;

        function openApp() {
            if (redirectAttempted) return;
            redirectAttempted = true;

            document.getElementById('openAppBtn').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('statusMsg').textContent = 'Opening Nimons360 app...';

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deepLink;
            document.body.appendChild(iframe);

            setTimeout(() => {
                window.location.href = deepLink;
            }, 100);

            let visibilityTimer;
            const checkVisibility = () => {
                if (document.hidden) {
                    appOpened = true;
                    clearTimeout(visibilityTimer);
                }
            };

            document.addEventListener('visibilitychange', checkVisibility);

            visibilityTimer = setTimeout(() => {
                document.removeEventListener('visibilitychange', checkVisibility);

                if (!appOpened && !document.hidden) {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('statusMsg').textContent = 'Unable to open app automatically';
                    document.getElementById('statusMsg').style.color = '#dc3545';
                    document.getElementById('openAppBtn').textContent = 'Try Again';
                    document.getElementById('openAppBtn').style.display = 'inline-block';
                    redirectAttempted = false;
                }
            }, 2500);
        }

        if (!familyId || !familyCode) {
            document.getElementById('openAppBtn').style.display = 'none';
            document.getElementById('statusMsg').innerHTML = '⚠️ Invalid link. Missing family information.';
            document.getElementById('statusMsg').style.color = '#dc3545';
        } else {
            window.addEventListener('load', () => {
                setTimeout(() => {
                    openApp();
                }, 800);
            });
        }

        window.addEventListener('beforeunload', (e) => {
            if (redirectAttempted && !appOpened) {
            }
        });
    </script>
</body>
</html>
